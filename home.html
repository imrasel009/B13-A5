<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Github Issues Tracker</title>

    <!-- Tailwind and Daisy -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <!-- Font awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <style>
      * {
        font-family: "Geist", sans-serif;
      }
    </style>
  </head>
  <body>
    <header class="w-full px-20 py-4 border border-[#E9E9E9] flex justify-between items-center">
        <div class="flex items-center gap-1">
            <img src="./assets/github-logo.png" alt="" class="h-9">
            <h2 class="text-[#1F2937] font-semibold text-2xl">GitHub Issues Tracker</h2>
        </div>
        <div class="flex gap-4">
            <input id="input-search" class="py-3 px-4 border border-[#E4E4E7] rounded-[4px]" type="search" placeholder="Search issues...">
            <button id="btn-search" class="ml-4 rounded-[4px] py-3 px-4 bg-[#4A00FF] text-white font-semibold cursor-pointer">Search</button>
        </div>
    </header>

    <main class="w-full bg-[#F8FAFC] py-16 px-60">
        <div class="p-6 bg-white shadow-sm rounded-lg mb-4">
            <button id="all-btn" class="btn btn-outline btn-primary text-[#64748B] py-2 px-3 border-[#64748B] font-medium hover:text-white mr-2">ALL</button>
            <button id="open-btn" class="btn btn-outline btn-primary text-[#64748B] py-2 px-3 border-[#64748B] font-medium hover:text-white mr-2">Open</button>
            <button id="closed-btn" class="btn btn-outline btn-primary text-[#64748B] py-2 px-3 border-[#64748B] font-medium hover:text-white mr-2">Closed</button>
            
        </div>

        <div class="rounded-t-lg p-6 flex justify-between bg-white border border-[#E4E4E7]">
            <div class="flex gap-2 items-center">
                <img class="border-8 rounded-full border-[#ECE4FF]" src="./assets/Aperture.png" alt="">
                <div>
                    <h3 class="font-semibold text-xl text-[#1F2937]"><span id="total-cards"></span> Issues</h3>
                    <p class="text-[#64748B]">Track and manage your project issues</p>
                </div>
            </div>
            <div class="flex gap-4">
                <div class="flex items-center gap-2">
                    <img class="h-3" src="./assets/green.png" alt="">
                    <p>Open</p>
                </div>
                <div class="flex items-center gap-2">
                    <img class="h-3" src="./assets/velvet.png" alt="">
                    <p>Closed</p>
                </div>
            </div>
        </div>

        <hr class="border border-[#E4E4E7]">

        <div>
          <div id="card-holder" class="bg-[#FBFBFB] p-6 grid grid-cols-4 gap-3">
            <!-- dynamically cards added here -->
          </div>
          <div id="loading-spinner" class="h-[60vh] hidden justify-center items-center">
            <span class="loading loading-spinner loading-xl"></span>
          </div>
        </div>
    </main>
    
    <div>
      <!-- Open the modal using ID.showModal() method -->
      <dialog id="my_modal_1" class="modal">
        <div class="modal-box max-w-2xl"> 
          <div>
            <h2 id="modal-title" class="text-[#1F2937] text-2xl font-bold"></h2>
            
            <div class="flex gap-2 mb-6 items-center">
              <p id="modal-status" class="text-white p-2 rounded-2xl text-[12px] font-medium"></p>
              <p class="text-[#64748B]">.</p>
              <p id="modal-author" class="text-[#64748B]"></p>
              <p class="text-[#64748B]">.</p>
              <p id="modal-date" class="text-[#64748B]"></p>
            </div>

            <div id="modal-labels" class="flex gap-1 flex-wrap"></div>

            <p id="modal-description" class="text-[#64748B] my-6"></p>

            <div class="bg-[#F8FAFC] p-4 flex justify-between">
              <div>
                <p class="text-[#64748B]">Assignee:</p><br>
                <p id="modal-assignee" class="text-[#1F2937] font-semibold"></p>
              </div>
              <div>
                <p class="text-[#64748B]">Priority:</p><br>
                <p id="modal-priority" class="text-white p-2 rounded-2xl text-[12px] font-medium text-center min-w-[80px]"></p>
              </div>
            </div>
          </div>

          <div class="modal-action">
            <form method="dialog">
              <button class="btn bg-[#6366F1] hover:bg-[#4F46E5] text-white border-none px-6">Close</button>
            </form>
          </div>
        </div>
      </dialog>
    </div>
    <script src="script.js"></script>
  </body>
</html>
