<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Github Issues Tracker</title>

    <!-- Tailwind and Daisy -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <!-- Font awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <style>
      * {
        font-family: "Geist", sans-serif;
      }
    </style>
  </head>
  <body>
    <header class="w-full px-20 py-4 border border-[#E9E9E9] flex justify-between items-center">
        <div class="flex items-center gap-1">
            <img src="./assets/github-logo.png" alt="" class="h-9">
            <h2 class="text-[#1F2937] font-semibold text-2xl">GitHub Issues Tracker</h2>
        </div>
        <div class="flex gap-4">
            <input class="py-3 px-4 border border-[#E4E4E7] rounded-[4px]" type="search" placeholder="Search issues...">
            <button class="ml-4 rounded-[4px] py-3 px-4 bg-[#4A00FF] text-white font-semibold cursor-pointer   /I">+ New Issue</button>
        </div>
    </header>

    <main class="w-full bg-[#F8FAFC] py-16 px-60">
        <div class="p-6 bg-white shadow-sm rounded-lg mb-4">
            <button id="all-btn" class="btn btn-outline btn-primary text-[#64748B] py-2 px-3 border-[#64748B] font-medium hover:text-white mr-2">ALL</button>
            <button id="open-btn" class="btn btn-outline btn-primary text-[#64748B] py-2 px-3 border-[#64748B] font-medium hover:text-white mr-2">Open</button>
            <button id="closed-btn" class="btn btn-outline btn-primary text-[#64748B] py-2 px-3 border-[#64748B] font-medium hover:text-white mr-2">Closed</button>
            
        </div>

        <div class="rounded-t-lg p-6 flex justify-between bg-white border border-[#E4E4E7]">
            <div class="flex gap-2 items-center">
                <img class="border-8 rounded-full border-[#ECE4FF]" src="./assets/Aperture.png" alt="">
                <div>
                    <h3 class="font-semibold text-xl text-[#1F2937]"><span id="total-cards"></span> Issues</h3>
                    <p class="text-[#64748B]">Track and manage your project issues</p>
                </div>
            </div>
            <div class="flex gap-4">
                <div class="flex items-center gap-2">
                    <img class="h-3" src="./assets/green.png" alt="">
                    <p>Open</p>
                </div>
                <div class="flex items-center gap-2">
                    <img class="h-3" src="./assets/velvet.png" alt="">
                    <p>Closed</p>
                </div>
            </div>
        </div>

        <hr class="border border-[#E4E4E7]">

        <div id="card-holder" class="bg-[#FBFBFB] p-6 grid grid-cols-4 gap-3">
        </div>
    </main>
    <script src="script.js"></script>
  </body>
</html>
