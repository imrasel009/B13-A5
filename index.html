<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Github Issues Tracker | Login</title>

    <!-- Tailwind and Daisy -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <!-- Font awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <style>
      * {
        font-family: "Geist", sans-serif;
      }
    </style>
  </head>
  <body class="bg-[#F8FAFC] justify-items-center py-20">
    <div class="bg-white h-[743px] w-lg rounded-lg shadow-2xl p-8 justify-items-center">

      <div class="justify-items-center">
        <img src="./assets/github-logo.png" alt="" />
        <h2 class="text-[#1F2937] font-semibold text-2xl mt-6 mb-1">
          GitHub Issues Tracker
        </h2>
        <p class="text-[#64748B]">Sign in to manage your issues</p>
      </div>

      <div class="form py-6">
        <p class="mb-2">Username</p>
        <input id="input-username" type="text" class="w-[456px] p-4 rounded-lg border border-[#E4E4E7] mb-4" placeholder="Enter Username">
        <p class="mb-2">Password</p>
        <input id="input-pin" type="password" class="w-[456px] p-4 rounded-lg border border-[#E4E4E7] mb-6" placeholder="Enter Password">
        <button id="btn-login" class="bg-[#4A00FF] text-white py-4 w-full rounded-lg font-semibold cursor-pointer">Sign In</button>
      </div>

      <div class="w-full grid grid-cols-3 items-center gap-2 mb-6">
        <div><hr class="border border-[#E4E4E7]"></div>
        <p class="text-center">OR</p>
        <div><hr class="border border-[#E4E4E7]"></div>
      </div>

      <p class="text-[#64748B] text-[14px] mb-2">Demo Credentials:</p>

      <div class="p-6 bg-[#F8FAFC] w-full rounded-lg text-center">
        <p><span class="text-[#1F2937] font-semibold">Username:</span> admin</p>
        <p><span class="text-[#1F2937] font-semibold">Password:</span> admin123</p>
      </div>
    </div>
    <script src="./login.js"></script>
  </body>
</html>
